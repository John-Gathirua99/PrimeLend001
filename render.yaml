services:
  - type: web
    name: ai-loan-system
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn Ai_Loan_System.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true








