{% extends 'base.html' %}
{% block title %}Pay Processing Fee{% endblock %}

{% block content %}
<div class="card shadow p-4 text-center">
    <h3 class="mb-3">Processing Fee</h3>
    <p class="fs-5">Amount: <strong>KES {{ loan.processing_fee_amount }}</strong></p>

    <form method="POST">
        {% csrf_token %}
        <button class="btn btn-primary btn-lg w-100">
            Pay via MPESA
        </button>
    </form>
</div>
{% endblock %}
